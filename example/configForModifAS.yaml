# =============================================================
# Example config for dRNAmodif_1/_2 (modification) and dRNAas (splicing)
# =============================================================

ref: "/path/to/annotation.gtf"

# ---- dRNAas : alternative splicing ----------------------------
# Each condition lists its replicate sample names (the EXA names from
# dRNAmain). Replicate counts may differ between conditions.
conditions:
  condition1: ["test1", "test2"]
  condition2: ["test3", "test4"]

# ---- dRNAmodif_2 : RNA modification (nanocompore) -------------
S1R1: "test1"
S1R2: "test2"
S2R1: "test3"
S2R2: "test4"
sample1: "condition1"
sample2: "condition2"
