# =============================================================
# Example config for dRNAas (splicing) and dRNAmodif_2 (modification)
# =============================================================

# GTF annotation -- used by dRNAas (suppa generateEvents)
gtf: "/path/to/annotation.gtf"

# Transcriptome FASTA -- used by dRNAmodif_2 (nanocompore sampcomp)
fasta: "/path/to/transcriptome.fa"

# Each condition lists its replicate sample names (the EXA names from
# dRNAmain). Replicate counts may differ between conditions.
conditions:
  condition1: ["test1", "test2"]
  condition2: ["test3", "test4"]
