# =============================================================
# Config shared by dRNAas (splicing) and dRNAmodif_2 (modification)
# =============================================================

# GTF annotation -- used by dRNAas (suppa generateEvents)
gtf: "location of GTF file"

# Transcriptome FASTA -- used by dRNAmodif_2 (nanocompore sampcomp)
fasta: "location of transcriptome fasta"

# Conditions -> replicate sample names (shared by both modules).
# Sample names must match the project names (EXA) used in dRNAmain.
# To add a condition or a replicate, edit only this block -- the rules in
# dRNAas.py and dRNAmodif_2.py adapt automatically.
# NOTE: both diffSplice and sampcomp compare exactly two conditions.
conditions:
  condition1: ["S1R1", "S1R2"]
  condition2: ["S2R1", "S2R2"]
