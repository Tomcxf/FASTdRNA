# =============================================================
# Config shared by dRNAmodif_1/_2 (modification) and dRNAas (splicing)
# =============================================================

# Reference used by both modules:
#   - dRNAas       : as the GTF annotation (suppa generateEvents)
#   - dRNAmodif_2  : as the transcriptome FASTA (nanocompore)
ref: "location of GTF file"

# ---- dRNAas : alternative splicing ----------------------------
# Map each condition to its list of replicate sample names.
# Sample names must match the project names (EXA) used in dRNAmain.
# To add a condition or a replicate, edit only this block -- the rules
# in dRNAas.py adapt automatically. diffSplice compares exactly two
# conditions.
conditions:
  condition1: ["S1R1", "S1R2"]
  condition2: ["S2R1", "S2R2"]

# ---- dRNAmodif_2 : RNA modification (nanocompore) -------------
# Legacy flat keys, still consumed by dRNAmodif_2.py.
# sample1/sample2 are the two condition labels.
S1R1: "location of S1R1"
S1R2: "location of S1R2"
S2R1: "location of S2R1"
S2R2: "location of S2R2"
sample1: "condition1"
sample2: "condition2"
